<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three Overlapping Squares</title>
    <style>
      .square {
            width: 50px;
            height: 50px;
            
        }

      .square-red1 {
            background-color: red;
        }

        
      .square-blue {
            background-color: green;
            left: 50px;
            top: 50px;
        }

        
      .square-red2 {
            background-color: red;
            left: 50px;
            top: 50px;
        }
    </style>
</head>

<body>
    <div class="square square-red1"></div>
    <div class="square square-blue"></div>
    <div class="square square-red2"></div>
</body>

</html>
